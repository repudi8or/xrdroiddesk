repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']

  # Kotlin linting via ktlint (runs ./gradlew ktlintCheck on staged .kt files)
  - repo: local
    hooks:
      - id: ktlint
        name: ktlint
        language: system
        entry: bash -c 'JAVA_HOME="/Applications/Android Studio.app/Contents/jbr/Contents/Home" ./gradlew ktlintCheck --quiet'
        files: \.kt$
        pass_filenames: false

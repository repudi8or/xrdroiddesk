repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']

  # Kotlin linting via ktlint
  # Activated once the Android Gradle project is initialised.
  # Requires: brew install ktlint  OR  gradle ktlintInstallGitPreCommitHook
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.14.0
    hooks:
      - id: pretty-format-kotlin
        args: [--autofix]
        # Remove the 'exclude' line once the Gradle project exists
        exclude: '^$'
